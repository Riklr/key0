services:
  agentgate:
    build: ..
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
        required: false

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

volumes:
  redis-data:
